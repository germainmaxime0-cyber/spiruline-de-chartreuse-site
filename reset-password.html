<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>Réinitialiser mon mot de passe — Spiruline de Chartreuse</title>
<link rel="icon" type="image/png" href="images/logo.png">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Lato',sans-serif;font-weight:300;background:#F0EBE0;color:#2d2d2d;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem;}
.box{background:white;border-radius:14px;padding:2.5rem;max-width:380px;width:100%;box-shadow:0 4px 24px rgba(0,0,0,0.08);}
h1{font-family:'Playfair Display',serif;font-size:22px;color:#0E7C74;margin-bottom:1.2rem;text-align:center;}
input{width:100%;padding:10px 12px;border-radius:8px;border:1px solid #e0d8cc;font-size:14px;margin-bottom:0.8rem;font-family:'Lato',sans-serif;}
button{width:100%;background:#0E7C74;color:white;border:none;padding:12px;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;}
button:disabled{opacity:0.6;cursor:not-allowed;}
.msg{font-size:13px;margin-bottom:0.8rem;display:none;}
.msg.error{color:#b23b3b;}
.msg.ok{color:#0E7C74;}
a{color:#0E7C74;}
.password-field{position:relative;}
.password-field input{padding-right:38px;}
.password-toggle{position:absolute;top:50%;right:2px;transform:translateY(-50%);width:34px;height:28px;background:none;border:none;padding:0;margin:0;cursor:pointer;color:#888;display:flex;align-items:center;justify-content:center;}
.password-toggle:hover{color:#0E7C74;}
</style>
</head>
<body>

<div class="box">
  <h1>Nouveau mot de passe</h1>
  <p class="msg" id="msg"></p>
  <form id="resetForm">
    <div class="password-field">
      <input type="password" id="password" placeholder="Nouveau mot de passe (8 caractères min.)" autocomplete="new-password">
      <button type="button" class="password-toggle" id="passwordToggleBtn" aria-label="Afficher le mot de passe"></button>
    </div>
    <div class="password-field">
      <input type="password" id="passwordConfirm" placeholder="Confirmer le mot de passe" autocomplete="new-password">
      <button type="button" class="password-toggle" id="passwordConfirmToggleBtn" aria-label="Afficher le mot de passe"></button>
    </div>
    <button type="submit" id="submitBtn">Réinitialiser mon mot de passe</button>
  </form>
</div>

<script>
const EYE_OPEN_SVG = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7Z"/><circle cx="12" cy="12" r="3"/></svg>';
const EYE_CLOSED_SVG = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.94 10.94 0 0 1 12 19c-7 0-11-7-11-7a20.3 20.3 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 7 11 7a20.3 20.3 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>';

function setupPasswordToggle(inputId, btnId) {
  const input = document.getElementById(inputId);
  const btn = document.getElementById(btnId);
  if (!input || !btn) return;
  btn.innerHTML = EYE_OPEN_SVG;
  btn.addEventListener('click', () => {
    const showing = input.type === 'text';
    input.type = showing ? 'password' : 'text';
    btn.innerHTML = showing ? EYE_OPEN_SVG : EYE_CLOSED_SVG;
    btn.setAttribute('aria-label', showing ? 'Afficher le mot de passe' : 'Masquer le mot de passe');
  });
}
setupPasswordToggle('password', 'passwordToggleBtn');
setupPasswordToggle('passwordConfirm', 'passwordConfirmToggleBtn');

const params = new URLSearchParams(window.location.search);
const token = params.get('token');
const msgEl = document.getElementById('msg');

if (!token) {
  msgEl.textContent = 'Lien invalide : aucun jeton de réinitialisation trouvé.';
  msgEl.className = 'msg error';
  msgEl.style.display = 'block';
  document.getElementById('resetForm').style.display = 'none';
}

document.getElementById('resetForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const password = document.getElementById('password').value;
  const passwordConfirm = document.getElementById('passwordConfirm').value;
  msgEl.style.display = 'none';

  if (password.length < 8) {
    msgEl.textContent = 'Le mot de passe doit contenir au moins 8 caractères.';
    msgEl.className = 'msg error';
    msgEl.style.display = 'block';
    return;
  }
  if (password !== passwordConfirm) {
    msgEl.textContent = 'Les deux mots de passe ne correspondent pas.';
    msgEl.className = 'msg error';
    msgEl.style.display = 'block';
    return;
  }

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = 'Enregistrement...';
  try {
    const res = await fetch('/api/customer-reset-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token, password })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Échec de la réinitialisation.');
    msgEl.textContent = 'Mot de passe modifié avec succès. Vous pouvez maintenant vous connecter sur la boutique.';
    msgEl.className = 'msg ok';
    msgEl.style.display = 'block';
    document.getElementById('resetForm').style.display = 'none';
  } catch (err) {
    msgEl.textContent = err.message;
    msgEl.className = 'msg error';
    msgEl.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Réinitialiser mon mot de passe';
  }
});
</script>
</body>
</html>
