<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>Commandes — Administration</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
em{font-style:normal;}
body{font-family:'Lato',sans-serif;font-weight:300;background:#FAF8F3;color:#2d2d2d;padding:2rem;}
h1{font-family:'Playfair Display',serif;font-size:28px;color:#0E7C74;margin-bottom:1.5rem;}
.login-box{max-width:340px;margin:4rem auto;background:white;border-radius:12px;padding:2rem;box-shadow:0 2px 16px rgba(0,0,0,0.08);}
.login-box input{width:100%;padding:10px;border-radius:8px;border:1px solid #e0d8cc;font-size:14px;margin-bottom:1rem;}
.login-box button{width:100%;background:#0E7C74;color:white;border:none;padding:12px;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;}
.password-field{position:relative;}
.password-field input{padding-right:38px;}
.login-box .password-toggle{position:absolute;top:50%;right:2px;transform:translateY(-50%);width:34px;height:28px;background:none;border:none;padding:0;margin:0;cursor:pointer;color:#888;display:flex;align-items:center;justify-content:center;}
.login-box .password-toggle:hover{color:#0E7C74;}
.login-error{color:#b23b3b;font-size:13px;margin-bottom:1rem;display:none;}
.orders{display:flex;flex-direction:column;gap:1rem;max-width:900px;}
.order-card{background:white;border-radius:12px;padding:1.2rem 1.5rem;box-shadow:0 2px 12px rgba(0,0,0,0.06);}
.order-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:0.6rem;flex-wrap:wrap;gap:0.5rem;}
.order-name{font-family:'Playfair Display',serif;font-size:17px;}
.order-status{font-size:11px;font-weight:700;letter-spacing:0.05em;text-transform:uppercase;padding:4px 10px;border-radius:12px;}
.status-a_traiter{background:#fdf0d5;color:#a06a00;}
.status-envoye{background:#E3F5F3;color:#0E7C74;}
.status-erreur{background:#fbe2e2;color:#b23b3b;}
.status-annulee{background:#e5e5e5;color:#666;}
.status-en_attente_paiement{background:#e3ecf7;color:#2454a0;}
.order-number{font-size:15px;color:#2454a0;font-weight:700;margin-left:0.6rem;font-family:'Playfair Display',serif;}
.cancel-btn{background:none;border:1px solid #b23b3b;color:#b23b3b;padding:7px 15px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;margin-left:0.5rem;}
.cancel-btn:disabled{opacity:0.5;cursor:not-allowed;}
.paid-btn{background:#2454a0;color:white;border:none;padding:8px 16px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;margin-left:0.5rem;}
.paid-btn:disabled{opacity:0.5;cursor:not-allowed;}
.order-detail{font-size:13px;color:#555;line-height:1.7;}
.order-content{font-size:13px;color:#333;margin-top:0.4rem;}
.order-total{font-size:13px;font-weight:700;color:#0E7C74;margin-top:0.4rem;}
.order-actions{margin-top:0.8rem;}
.send-btn{background:#0E7C74;color:white;border:none;padding:8px 16px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;}
.send-btn:disabled{background:#ccc;cursor:not-allowed;}
.order-error{color:#b23b3b;font-size:12px;margin-top:0.4rem;}
.empty{color:#999;}

.admin-tabs{display:flex;gap:0.6rem;margin-bottom:1.5rem;}
.admin-tab{background:white;border:1px solid #e0d8cc;color:#555;padding:9px 18px;border-radius:20px;font-size:13px;font-weight:700;cursor:pointer;}
.admin-tab.active{background:#0E7C74;border-color:#0E7C74;color:white;}

.stats-cards{display:flex;gap:1rem;flex-wrap:wrap;margin-bottom:1.5rem;}
.stats-card{background:white;border-radius:12px;padding:1.2rem 1.6rem;box-shadow:0 2px 12px rgba(0,0,0,0.06);min-width:180px;}
.stats-card-label{font-size:12px;color:#888;text-transform:uppercase;letter-spacing:0.04em;margin-bottom:0.3rem;}
.stats-card-value{font-family:'Playfair Display',serif;font-size:26px;color:#0E7C74;font-weight:700;}
.export-btn{display:inline-block;background:#0E7C74;color:white;padding:10px 18px;border-radius:20px;font-size:13px;font-weight:700;text-decoration:none;margin-bottom:1.5rem;}
.stats-panels{display:grid;grid-template-columns:1fr 1fr;gap:1.2rem;margin-bottom:1.2rem;max-width:1100px;}
.stats-panel{background:white;border-radius:12px;padding:1.4rem;box-shadow:0 2px 12px rgba(0,0,0,0.06);}
.stats-panel h2{font-family:'Playfair Display',serif;font-size:17px;color:#2d2d2d;margin-bottom:0.9rem;font-weight:400;}
.stats-panel-wide{grid-column:1/-1;}
.period-tabs{display:flex;gap:0.4rem;margin-bottom:1rem;}
.period-tab{background:#F0EBE0;border:none;color:#555;padding:6px 14px;border-radius:14px;font-size:12px;font-weight:700;cursor:pointer;}
.period-tab.active{background:#0E7C74;color:white;}
.compare-years-check{display:flex;align-items:center;gap:0.4rem;font-size:12px;color:#555;margin-bottom:0.8rem;cursor:pointer;}
.top-products-table{width:100%;border-collapse:collapse;font-size:13px;}
.top-products-table th{text-align:left;color:#888;font-size:11px;text-transform:uppercase;letter-spacing:0.03em;padding-bottom:0.5rem;border-bottom:1px solid #eee;}
.top-products-table td{padding:0.5rem 0;border-bottom:1px solid #f5f5f5;}
.top-products-table td:last-child{text-align:right;font-weight:700;color:#0E7C74;}

<body>

<div class="login-box" id="loginBox">
  <h1 style="font-size:20px;">Administration</h1>
  <p class="login-error" id="loginError">Mot de passe incorrect.</p>
  <div class="password-field">
    <input type="password" id="passwordInput" placeholder="Mot de passe">
    <button type="button" class="password-toggle" id="passwordToggleBtn" aria-label="Afficher le mot de passe"></button>
  </div>
  <button id="loginBtn">Se connecter</button>
</div>

<div id="adminApp" style="display:none;">
  <div class="admin-tabs">
    <button class="admin-tab active" id="tabOrdersBtn">Commandes</button>
    <button class="admin-tab" id="tabStatsBtn">Statistiques &amp; clients</button>
  </div>

  <div id="ordersView">
    <h1>Commandes à traiter</h1>
    <div class="orders" id="ordersList"></div>
  </div>

  <div id="statsView" style="display:none;">
    <h1>Statistiques &amp; clients</h1>
    <a class="export-btn" href="/api/admin-export-customers">Télécharger le fichier clients (CSV)</a>
    <div class="stats-cards">
      <div class="stats-card"><div class="stats-card-label">Commandes</div><div class="stats-card-value" id="statTotalOrders">—</div></div>
      <div class="stats-card"><div class="stats-card-label">Chiffre d'affaires</div><div class="stats-card-value" id="statTotalRevenue">—</div></div>
      <div class="stats-card"><div class="stats-card-label">Panier moyen</div><div class="stats-card-value" id="statAvgBasket">—</div></div>
    </div>
    <div class="stats-panels">
      <div class="stats-panel stats-panel-wide">
        <h2>Évolution des ventes</h2>
        <div class="period-tabs">
          <button class="period-tab" data-period="week">Semaine</button>
          <button class="period-tab active" data-period="month">Mois</button>
          <button class="period-tab" data-period="year">Année</button>
        </div>
        <label class="compare-years-check" id="compareYearsRow">
          <input type="checkbox" id="compareYearsCheckbox">
          <span>Comparer avec les ann&eacute;es pr&eacute;c&eacute;dentes</span>

        <canvas id="evolutionChart" height="90"></canvas>
      </div>
      <div class="stats-panel">
        <h2>Ventes par catégorie</h2>
        <canvas id="categoryChart" height="200"></canvas>
      </div>
      <div class="stats-panel">
        <h2>Produits les plus vendus</h2>
        <table class="top-products-table">

        </table>

<script>
const EYE_OPEN_SVG = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7Z"/><circle cx="12" cy="12" r="3"/></svg>';
const EYE_CLOSED_SVG = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.94 10.94 0 0 1 12 19c-7 0-11-7-11-7a20.3 20.3 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 7 11 7a20.3 20.3 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>';

function setupPasswordToggle(inputId, btnId) {
  const input = document.getElementById(inputId);
  const btn = document.getElementById(btnId);
  if (!input || !btn) return;
  btn.innerHTML = EYE_OPEN_SVG;
  btn.addEventListener('click', () => {
    const showing = input.type === 'text';
    input.type = showing ? 'password' : 'text';
    btn.innerHTML = showing ? EYE_OPEN_SVG : EYE_CLOSED_SVG;
    btn.setAttribute('aria-label', showing ? 'Afficher le mot de passe' : 'Masquer le mot de passe');
  });
}

const loginBox = document.getElementById('loginBox');
const adminApp = document.getElementById('adminApp');
const ordersView = document.getElementById('ordersView');
const statsView = document.getElementById('statsView');
const loginError = document.getElementById('loginError');

document.getElementById('loginBtn').addEventListener('click', login);
document.getElementById('passwordInput').addEventListener('keydown', (e) => { if (e.key === 'Enter') login(); });
setupPasswordToggle('passwordInput', 'passwordToggleBtn');

async function login() {
  loginError.style.display = 'none';
  const password = document.getElementById('passwordInput').value;
  const res = await fetch('/api/admin-login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ password })
  });
  if (res.ok) {
    loginBox.style.display = 'none';
    adminApp.style.display = 'block';
    loadOrders();
  } else {
    const data = await res.json().catch(() => null);
    loginError.textContent = (data && data.error) || 'Mot de passe incorrect.';
    loginError.style.display = 'block';
  }
}

document.getElementById('tabOrdersBtn').addEventListener('click', () => {
  document.getElementById('tabOrdersBtn').classList.add('active');
  document.getElementById('tabStatsBtn').classList.remove('active');
  ordersView.style.display = 'block';
  statsView.style.display = 'none';
});
document.getElementById('tabStatsBtn').addEventListener('click', () => {
  document.getElementById('tabStatsBtn').classList.add('active');
  document.getElementById('tabOrdersBtn').classList.remove('active');
  ordersView.style.display = 'none';
  statsView.style.display = 'block';
  loadStats();
});

const STATUS_LABELS = { a_traiter: 'À traiter', envoye: 'Envoyé à Boxtal', erreur: 'Erreur', annulee: 'Annulée', en_attente_paiement: 'En attente de paiement' };
const PAYMENT_LABELS = { carte: 'Carte bancaire', cheque: 'Chèque', virement: 'Virement' };

async function loadOrders() {
  const res = await fetch('/api/admin-orders');
  if (res.status === 401) {
    adminApp.style.display = 'none';
    loginBox.style.display = 'block';
    return;
  }
  const data = await res.json();
  renderOrders(data.orders || []);
}

function renderOrders(orders) {
  const list = document.getElementById('ordersList');
  if (orders.length === 0) {
    list.innerHTML = '<p class="empty">Aucune commande pour le moment.</p>';
    return;
  }

  list.innerHTML = orders.map((o) => {
    const contenu = (o.contenu || []).map((c) => `${c.quantite}× ${c.description}`).join(', ');
    const canSend = (o.status === 'a_traiter' || o.status === 'erreur') && o.modeLivraisonCle !== 'retrait';
    const canCancel = o.status !== 'annulee';
    const canMarkPaid = o.status === 'en_attente_paiement';
    const errorMsg = o.status === 'erreur' && o.boxtal && o.boxtal.error ? `<p class="order-error">${escapeHtml(o.boxtal.error)}</p>` : '';
    const refundErrorMsg = o.refundError ? `<p class="order-error">Remboursement Stripe échoué : ${escapeHtml(o.refundError)}</p>` : '';
    return `
      <div class="order-card" data-order-id="${o.id}">
        <div class="order-top">
          <span class="order-name">${escapeHtml(o.prenom || '')} ${escapeHtml(o.nom || '')}${o.numeroCommande ? `<span class="order-number">n°${escapeHtml(o.numeroCommande)}</span>` : ''}</span>
          <span class="order-status status-${o.status}">${STATUS_LABELS[o.status] || o.status}</span>
        </div>
        <div class="order-detail">
          ${escapeHtml(o.adresse?.rue || '')}, ${escapeHtml(o.adresse?.codePostal || '')} ${escapeHtml(o.adresse?.ville || '')}<br>
          ${escapeHtml(o.telephone || '')} — ${escapeHtml(o.email || '')}<br>
          ${escapeHtml(o.modeLivraison || '')}${o.pointRelaisNom ? ' — ' + escapeHtml(o.pointRelaisNom) : (o.pointRelaisCode ? ' (point ' + escapeHtml(o.pointRelaisCode) + ')' : '')} — ${o.poidsColisKg ? o.poidsColisKg.toFixed(2) + ' kg' : ''}<br>
          Paiement : ${escapeHtml(PAYMENT_LABELS[o.modePaiement] || o.modePaiement || 'Carte bancaire')}${o.reductionPourcent ? ` — <strong>réduction -${o.reductionPourcent}% appliquée</strong>` : ''}<br>
          ${o.hasAccount ? 'Compte client : oui' : 'Commande invité (pas de compte)'}
        </div>
        ${o.montantTotalEur != null ? `<div class="order-total">Total : ${o.montantTotalEur.toFixed(2)} €${o.sousTotalEur != null ? ` <span style="font-weight:400;font-size:12px;color:#999;">(sous-total ${o.sousTotalEur.toFixed(2)} €)</span>` : ''}</div>` : ''}
        <div class="order-content">${escapeHtml(contenu)}</div>
        ${errorMsg}
        ${refundErrorMsg}
        <div class="order-actions">
          ${canMarkPaid ? `<button class="paid-btn" data-paid="${o.id}">Marquer comme payée</button>` : ''}
          ${canSend ? `<button class="send-btn" data-send="${o.id}">${o.status === 'erreur' ? 'Réessayer' : 'Envoyer vers Boxtal'}</button>` : ''}
          ${canCancel ? `<button class="cancel-btn" data-cancel="${o.id}">Annuler la commande</button>` : ''}
        </div>
      </div>`;
  }).join('');

  list.querySelectorAll('[data-send]').forEach((btn) => {
    btn.addEventListener('click', () => sendToBoxtal(btn.getAttribute('data-send'), btn));
  });
  list.querySelectorAll('[data-cancel]').forEach((btn) => {
    btn.addEventListener('click', () => cancelOrder(btn.getAttribute('data-cancel'), btn));
  });
  list.querySelectorAll('[data-paid]').forEach((btn) => {
    btn.addEventListener('click', () => markPaid(btn.getAttribute('data-paid'), btn));
  });
}

async function markPaid(orderId, btn) {
  if (!confirm('Confirmer la réception du règlement (chèque encaissé ou virement reçu) pour cette commande ?')) {
    return;
  }
  btn.disabled = true;
  btn.textContent = 'Validation...';
  try {
    const res = await fetch('/api/admin-mark-paid', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ orderId })
    });
    const data = await res.json();
    if (!res.ok) {
      alert(data.error || 'Échec de la mise à jour.');
    }
  } catch (err) {
    alert('Échec de la mise à jour (erreur réseau).');
  } finally {
    loadOrders();
  }
}

async function cancelOrder(orderId, btn) {
  if (!confirm('Annuler cette commande ? Le client sera remboursé automatiquement et l\'expédition Boxtal annulée si elle avait déjà été créée.')) {
    return;
  }
  btn.disabled = true;
  btn.textContent = 'Annulation...';
  try {
    const res = await fetch('/api/admin-cancel-order', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ orderId })
    });
    const data = await res.json();
    if (!res.ok) {
      alert(data.error || 'Échec de l\'annulation.');
    }
  } catch (err) {
    alert('Échec de l\'annulation (erreur réseau).');
  } finally {
    loadOrders();
  }
}

async function sendToBoxtal(orderId, btn) {
  btn.disabled = true;
  btn.textContent = 'Envoi...';
  try {
    const res = await fetch('/api/admin-send-to-boxtal', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ orderId })
    });
    const data = await res.json();
    if (!res.ok) {
      alert(data.error || 'Échec de l\'envoi vers Boxtal.');
    }
  } catch (err) {
    alert('Échec de l\'envoi vers Boxtal (erreur réseau).');
  } finally {
    loadOrders();
  }
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str == null ? '' : String(str);
  return div.innerHTML;
}

// --- Statistiques & clients ---

const MONTH_LABELS = ['Janv.', 'Févr.', 'Mars', 'Avr.', 'Mai', 'Juin', 'Juil.', 'Août', 'Sept.', 'Oct.', 'Nov.', 'Déc.'];

function getISOWeek(date) {
  const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
  const dayNum = (d.getUTCDay() + 6) % 7;
  d.setUTCDate(d.getUTCDate() - dayNum + 3);
  const firstThursday = new Date(Date.UTC(d.getUTCFullYear(), 0, 4));
  const week = 1 + Math.round(((d - firstThursday) / 86400000 - 3 + ((firstThursday.getUTCDay() + 6) % 7)) / 7);
  return { year: d.getUTCFullYear(), week };
}

function aggregateByPeriod(dailySeries, period) {
  const buckets = new Map();
  for (const day of dailySeries) {
    const date = new Date(day.date + 'T00:00:00');
    let key, label;
    if (period === 'week') {
      const { year, week } = getISOWeek(date);
      key = `${year}-S${String(week).padStart(2, '0')}`;
      label = `S${week} ${year}`;
    } else if (period === 'year') {
      key = String(date.getFullYear());
      label = key;
    } else {
      key = `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}`;
      label = `${MONTH_LABELS[date.getMonth()]} ${date.getFullYear()}`;
    }
    const bucket = buckets.get(key) || { key, label, revenue: 0, orders: 0 };
    bucket.revenue += day.revenue;
    bucket.orders += day.orders;
    buckets.set(key, bucket);
  }
  return Array.from(buckets.values()).sort((a, b) => a.key.localeCompare(b.key));
}

function formatEuro(n) {
  return (n || 0).toLocaleString('fr-FR', { style: 'currency', currency: 'EUR', minimumFractionDigits: 2 });
}

let statsData = null;
let currentPeriod = 'month';
let evolutionChartInstance = null;
let categoryChartInstance = null;

const YEAR_COLORS = ['#0E7C74', '#5FA39C', '#2454a0', '#c9a86a', '#a0785a'];

// Regroupe par sous-période (mois de l'année, ou n° de semaine) ET par année, pour pouvoir
// tracer une ligne par année sur le même axe (ex. comparer juillet 2026 à juillet 2025).
function groupByYearAndSubPeriod(dailySeries, period) {
  const byYear = new Map();
  for (const day of dailySeries) {
    const date = new Date(day.date + 'T00:00:00');
    const year = date.getFullYear();
    const subKey = period === 'week' ? getISOWeek(date).week : date.getMonth();

    if (!byYear.has(year)) byYear.set(year, new Map());
    const yearMap = byYear.get(year);
    const bucket = yearMap.get(subKey) || { subKey, revenue: 0, orders: 0 };
    bucket.revenue += day.revenue;
    bucket.orders += day.orders;
    yearMap.set(subKey, bucket);
  }
  return byYear;
}

function renderEvolutionChartCompare(period) {
  const byYear = groupByYearAndSubPeriod(statsData.dailySeries, period);
  const years = Array.from(byYear.keys()).sort((a, b) => a - b);

  const allSubKeys = new Set();
  years.forEach((y) => byYear.get(y).forEach((_, k) => allSubKeys.add(k)));
  const sortedSubKeys = Array.from(allSubKeys).sort((a, b) => a - b);
  const labelFor = (k) => (period === 'week' ? `S${k}` : MONTH_LABELS[k]);

  const datasets = years.map((year, idx) => {
    const yearMap = byYear.get(year);
    return {
      type: 'line',
      label: String(year),
      data: sortedSubKeys.map((k) => {
        const bucket = yearMap.get(k);
        return bucket ? Math.round(bucket.revenue * 100) / 100 : null;
      }),
      borderColor: YEAR_COLORS[idx % YEAR_COLORS.length],
      backgroundColor: YEAR_COLORS[idx % YEAR_COLORS.length],
      spanGaps: true,
      tension: 0.3,
    };
  });

  const ctx = document.getElementById('evolutionChart');
  if (evolutionChartInstance) evolutionChartInstance.destroy();
  evolutionChartInstance = new Chart(ctx, {
    data: { labels: sortedSubKeys.map(labelFor), datasets },
    options: {
      responsive: true,
      scales: { y: { beginAtZero: true, title: { display: true, text: 'CA (€)' } } },
    },
  });
}

function renderEvolutionChart(period) {
  if (!statsData) return;

  const compareCheckbox = document.getElementById('compareYearsCheckbox');
  document.getElementById('compareYearsRow').style.display = period === 'year' ? 'none' : 'flex';
  if (period !== 'year' && compareCheckbox.checked) {
    renderEvolutionChartCompare(period);
    return;
  }

  const buckets = aggregateByPeriod(statsData.dailySeries, period);
  const ctx = document.getElementById('evolutionChart');
  if (evolutionChartInstance) evolutionChartInstance.destroy();
  evolutionChartInstance = new Chart(ctx, {
    data: {
      labels: buckets.map((b) => b.label),
      datasets: [
        { type: 'bar', label: 'Nombre de commandes', data: buckets.map((b) => b.orders), backgroundColor: 'rgba(45,90,39,0.25)', yAxisID: 'y1' },
        { type: 'line', label: "Chiffre d'affaires (€)", data: buckets.map((b) => Math.round(b.revenue * 100) / 100), borderColor: '#0E7C74', backgroundColor: '#0E7C74', tension: 0.3, yAxisID: 'y' },
      ],
    },
    options: {
      responsive: true,
      scales: {
        y: { position: 'left', title: { display: true, text: 'CA (€)' }, beginAtZero: true },
        y1: { position: 'right', title: { display: true, text: 'Commandes' }, beginAtZero: true, grid: { drawOnChartArea: false } },
      },
    },
  });
}

function renderCategoryChart(categories) {
  const ctx = document.getElementById('categoryChart');
  if (categoryChartInstance) categoryChartInstance.destroy();
  categoryChartInstance = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: categories.map((c) => c.label),
      datasets: [{ label: 'Quantité vendue', data: categories.map((c) => c.quantite), backgroundColor: '#0E7C74' }],
    },
    options: { indexAxis: 'y', responsive: true, plugins: { legend: { display: false } }, scales: { x: { beginAtZero: true } } },
  });
}

function renderTopProducts(topProducts) {
  const tbody = document.getElementById('topProductsBody');
  tbody.innerHTML = topProducts.length
    ? topProducts.map((p) => `<tr><td>${escapeHtml(p.description)}</td><td>${p.quantite}</td></tr>`).join('')
    : '<tr><td colspan="2" class="empty">Aucune vente pour le moment.</td></tr>';
}

async function loadStats() {
  const res = await fetch('/api/admin-stats');
  if (res.status === 401) {
    adminApp.style.display = 'none';
    loginBox.style.display = 'block';
    return;
  }
  statsData = await res.json();
  document.getElementById('statTotalOrders').textContent = statsData.totalOrders;
  document.getElementById('statTotalRevenue').textContent = formatEuro(statsData.totalRevenue);
  document.getElementById('statAvgBasket').textContent = formatEuro(statsData.averageBasket);
  renderCategoryChart(statsData.categories);
  renderTopProducts(statsData.topProducts);
  renderEvolutionChart(currentPeriod);
}

document.querySelectorAll('.period-tab').forEach((btn) => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.period-tab').forEach((b) => b.classList.remove('active'));
    btn.classList.add('active');
    currentPeriod = btn.getAttribute('data-period');
    renderEvolutionChart(currentPeriod);
  });
});
document.getElementById('compareYearsCheckbox').addEventListener('change', () => {
  renderEvolutionChart(currentPeriod);
});
</script>
</body>
</html>
